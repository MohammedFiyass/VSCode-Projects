---
- name: Collect system information and send report
  hosts: all
  gather_facts: yes

  vars:
    report_file: "/tmp/system_report_{{ inventory_hostname }}.txt"

    # Mailtrap SMTP Details (store real creds in AWX credentials or extra-vars)
    #smtp_host: "sandbox.smtp.mailtrap.io"
    #smtp_port: 2525
    #smtp_username: "YOUR_MAILTRAP_USERNAME"
    #smtp_password: "YOUR_MAILTRAP_PASSWORD"

    #recipient_email: "recipient@example.com"
    mail_from: "awx-report@mailtrap.io"

  tasks:
    - name: Get uptime
      command: uptime
      register: uptime_out
      changed_when: false

    - name: Get disk usage
      command: df -h
      register: disk_out
      changed_when: false

    - name: Get memory usage
      command: free -m
      register: mem_out
      changed_when: false

    - name: Create report
      copy:
        dest: "{{ report_file }}"
        content: |
          ====================================
          System Information Report
          ====================================

          Hostname : {{ ansible_hostname }}
          IP       : {{ ansible_default_ipv4.address | default('N/A') }}
          OS       : {{ ansible_distribution }}
          Version  : {{ ansible_distribution_version }}
          Kernel   : {{ ansible_kernel }}

          ===== UPTIME =====
          {{ uptime_out.stdout }}

          ===== MEMORY =====
          {{ mem_out.stdout }}

          ===== DISK =====
          {{ disk_out.stdout }}

    - name: Fetch report to AWX execution node
      fetch:
        src: "{{ report_file }}"
        dest: "/tmp/"
        flat: yes

    - name: Send email
      mail:
        host: "{{ smtp_host }}"
        port: "{{ smtp_port }}"
        username: "{{ smtp_username }}"
        password: "{{ smtp_password }}"
        secure: starttls
        from: "{{ mail_from }}"
        to: "{{ recipient_email }}"
        subject: "System Report - {{ inventory_hostname }}"
        body: |
          Hello,

          Attached is the system report generated by AWX.

          Host: {{ inventory_hostname }}
        attach:
          - "/tmp/system_report_{{ inventory_hostname }}.txt"
      delegate_to: localhost
