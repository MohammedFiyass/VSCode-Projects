---
- name: Collect system information
  hosts: all
  gather_facts: yes

  vars:
    report_file: "/tmp/system_report_{{ inventory_hostname }}.txt"

  tasks:
    - name: Get uptime
      command: uptime
      register: uptime_out
      changed_when: false

    - name: Get disk usage
      command: df -h
      register: disk_out
      changed_when: false

    - name: Get memory usage
      command: free -m
      register: mem_out
      changed_when: false

    - name: Create system report
      copy:
        dest: "{{ report_file }}"
        content: |
          ====================================
          System Information Report
          ====================================

          Report Generated : {{ ansible_date_time.date }} {{ ansible_date_time.time }}

          Hostname         : {{ ansible_hostname }}
          FQDN             : {{ ansible_fqdn }}
          IP Address       : {{ ansible_default_ipv4.address | default('N/A') }}

          Operating System : {{ ansible_distribution }}
          OS Version       : {{ ansible_distribution_version }}
          Kernel Version   : {{ ansible_kernel }}
          Architecture     : {{ ansible_architecture }}

          CPU Cores        : {{ ansible_processor_vcpus }}
          Total Memory MB  : {{ ansible_memtotal_mb }}

          ===== UPTIME =====

          {{ uptime_out.stdout }}

          ===== MEMORY =====

          {{ mem_out.stdout }}

          ===== DISK USAGE =====

          {{ disk_out.stdout }}

    - name: Display report location
      debug:
        msg: "Report generated successfully at {{ report_file }}"
